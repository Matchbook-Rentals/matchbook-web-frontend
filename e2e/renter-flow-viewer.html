<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Renter Flow</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px;
      background: #0d1117;
      color: #e6edf3;
    }
    h1, h2, h3 { color: #f0f6fc; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th, td { border: 1px solid #30363d; padding: 8px 12px; text-align: left; }
    th { background: #161b22; }
    tr:nth-child(even) { background: #161b22; }
    .mermaid { background: #161b22; border-radius: 8px; padding: 24px; margin: 16px 0; }
    code { background: #161b22; padding: 2px 6px; border-radius: 4px; }
    pre { background: #161b22; padding: 16px; border-radius: 8px; overflow-x: auto; }
  </style>
</head>
<body>
  <div id="content">Loading...</div>

  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });

    async function load() {
      const res = await fetch('./renter-flow.md?_=' + Date.now());
      const md = await res.text();

      // Extract and replace mermaid code blocks before marked parses them
      const mermaidBlocks = [];
      const withPlaceholders = md.replace(/```mermaid\n([\s\S]*?)```/g, (_, code) => {
        const id = 'mermaid-' + mermaidBlocks.length;
        mermaidBlocks.push({ id, code });
        return `<div class="mermaid" id="${id}"></div>`;
      });

      document.getElementById('content').innerHTML = marked.parse(withPlaceholders);

      for (const { id, code } of mermaidBlocks) {
        const el = document.getElementById(id);
        if (el) {
          const { svg } = await mermaid.render('svg-' + id, code);
          el.innerHTML = svg;
        }
      }
    }

    load();
    setInterval(load, 2000);
  </script>
</body>
</html>
